<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ESA Client Onboarding</title>
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --fg:#f3f5f7; --muted:#9aa3b2;
    --accent:#ff5a3c; --accent-2:#ff7a5c; --line:#262b35; --ok:#27c093;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--fg)}
  #progress{position:fixed;top:0;left:0;height:5px;background:linear-gradient(90deg,var(--accent),var(--accent-2));width:0;transition:width .3s ease;z-index:10}
  .wrap{max-width:720px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;justify-content:flex-start;padding:56px 24px 120px}
  .wrap.center-screen{justify-content:center}
  .eyebrow{color:var(--accent);font-weight:700;letter-spacing:.05em;text-transform:uppercase;font-size:13px;margin-bottom:10px}
  .qnum{color:var(--muted);font-size:14px;margin-bottom:22px}
  .page-fields{margin-top:4px}
  .field-block{margin-bottom:30px}
  h1.q{font-size:30px;line-height:1.25;margin:0 0 8px}
  h2.q{font-size:21px;line-height:1.3;margin:0 0 8px;font-weight:600}
  .help{color:var(--muted);font-size:15px;margin:4px 0 14px;font-style:italic}
  .req{color:var(--accent);font-weight:700}
  input[type=text],input[type=email],input[type=tel],input[type=url],input[type=number],input[type=date],textarea{
    width:100%;background:var(--card);border:2px solid var(--line);color:var(--fg);
    font-size:18px;padding:16px;border-radius:12px;outline:none;transition:border .2s}
  input:focus,textarea:focus{border-color:var(--accent)}
  textarea{min-height:120px;resize:vertical;line-height:1.5}
  .choices{display:flex;flex-wrap:wrap;gap:10px}
  .choice{background:var(--card);border:2px solid var(--line);color:var(--fg);font-size:17px;
    padding:14px 20px;border-radius:12px;cursor:pointer;transition:all .15s}
  .choice:hover{border-color:var(--accent)}
  .choice.sel{border-color:var(--accent);background:rgba(255,90,60,.12)}
  .nav{display:flex;align-items:center;gap:14px;margin-top:30px}
  button.go{background:var(--accent);color:#fff;border:none;font-size:17px;font-weight:700;
    padding:14px 26px;border-radius:12px;cursor:pointer}
  button.go:hover{background:var(--accent-2)}
  button.ghost{background:transparent;border:none;color:var(--muted);font-size:15px;cursor:pointer}
  .save-note{position:fixed;bottom:16px;left:0;right:0;text-align:center;color:var(--muted);font-size:13px;pointer-events:none}
  .footer-sec{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);
    padding:10px 24px;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted)}
  /* intro + done screens */
  .center h1{font-size:34px;margin:0 0 14px}
  .center p{color:var(--muted);font-size:18px;line-height:1.5;max-width:560px}
  .pill{display:inline-block;background:rgba(39,192,147,.15);color:var(--ok);padding:4px 12px;border-radius:999px;font-size:13px;font-weight:700;margin-bottom:18px}
  a.link{color:var(--accent)}
</style>
</head>
<body>
<div id="progress"></div>
<div class="footer-sec">
  <span>ESA Client Onboarding</span>
  <span id="counter"></span>
</div>
<div class="wrap" id="screen"></div>
<div class="save-note" id="saveNote"></div>

<script>
/* ====== CONFIG ====== */
// Supabase project (the "anon public" key is safe to expose — the database only allows
// inserts with it, never reads; row-level security blocks reading other clients' data).
const SUPABASE_URL = "https://hiqlubrygiprmelechza.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpcWx1YnJ5Z2lwcm1lbGVjaHphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzYzMTMsImV4cCI6MjA5Njg1MjMxM30.59FHO2xh9jTLsH0iCwuSWkoY_RKZNtqbukdUQEaCpuE";

/* ====== QUESTIONS (all 71) ======
   type: text | email | tel | url | number | date | textarea | choice
   For choice, provide options[].
   NOTE: questions and their keys are unchanged — only the page layout changed. */
const SECTIONS = {
  basic:"Basic info", event:"Your event", team:"Team & roles",
  customer:"Ideal customer & sales", status:"Current status", offer:"Offer & pricing",
  marketing:"Marketing & data", payment:"Payment & data flow", messaging:"Messaging setup",
  questionnaire:"Marketing questionnaire", brandstory:"Brand positioning", brandsnap:"Brand & competitors",
  audience:"Your audience (the 10 that matter most)"
};
const Q = [
  // 1) Basic
  {k:"full_name", s:"basic", q:"What's your full name?", t:"text", req:true},
  {k:"email", s:"basic", q:"Best email to reach you?", t:"email", req:true},
  {k:"phone", s:"basic", q:"Best phone number?", t:"tel", req:true},
  {k:"company_name", s:"basic", q:"Company / organization name?", t:"text", req:true},
  // 2) Event
  {k:"event_name", s:"event", q:"What's the event name?", t:"text", req:true},
  {k:"website", s:"event", q:"Your website?", t:"url"},
  {k:"linkedin_url", s:"event", q:"LinkedIn profile or company page?", t:"url", help:"Optional — paste the full URL if you have one."},
  {k:"instagram_url", s:"event", q:"Instagram profile?", t:"url", help:"Optional — paste the full URL if you have one."},
  {k:"facebook_url", s:"event", q:"Facebook page or profile?", t:"url", help:"Optional — paste the full URL if you have one."},
  {k:"event_location", s:"event", q:"Event location?", t:"text", req:true, help:"City/venue, or “online”"},
  {k:"event_date", s:"event", q:"Event date?", t:"date", req:true},
  {k:"target_attendees", s:"event", q:"How many attendees do you want?", t:"number", req:true, help:"Your fill goal"},
  {k:"is_first_event", s:"event", q:"Is this your first event?", t:"choice", options:["Yes","No"]},
  {k:"main_speakers", s:"event", q:"Main speaker(s)?", t:"textarea", help:"Name + one line on each"},
  // 3) Team
  {k:"team_roles", s:"team", q:"Name and role of each team member helping with this event?", t:"textarea"},
  {k:"outbound_calls", s:"team", q:"Is your team going to make outbound calls?", t:"choice", options:["Yes","No"]},
  {k:"reps_day_of", s:"team", q:"How many reps will you have day-of to sell your high-ticket offer at the event?", t:"number"},
  {k:"internal_marketing_person", s:"team", q:"Do you have an internal marketing or data-tracking person?", t:"choice", options:["Yes","No"]},
  // 4) Ideal customer & sales process
  {k:"lead_qualification", s:"customer", q:"How do you qualify leads?", t:"textarea"},
  {k:"ideal_customer", s:"customer", q:"Who is your ideal customer?", t:"textarea"},
  {k:"current_sales_process", s:"customer", q:"What is your current sales process?", t:"textarea"},
  {k:"lead_contact_speed", s:"customer", q:"How long before leads are contacted after opt-in?", t:"text"},
  {k:"ticket_price_overview", s:"customer", q:"Overview of ticket prices?", t:"text", req:true},
  // 5) Current status
  {k:"tickets_sold_so_far", s:"status", q:"How many tickets sold so far, and where did they come from?", t:"textarea"},
  {k:"interested_leads_count", s:"status", q:"How many leads are interested in this event?", t:"number"},
  {k:"ticket_sales_tracking", s:"status", q:"How are you currently tracking ticket sales?", t:"textarea"},
  // 6) Offer & pricing
  {k:"has_event_offer", s:"offer", q:"Will you have an offer at the event?", t:"choice", options:["Yes","No"], req:true},
  {k:"event_offer_price", s:"offer", q:"If yes, how much will that offer be?", t:"text"},
  // 7) Marketing & data strategy
  {k:"ad_spend", s:"marketing", q:"How much is allocated for ad spend?", t:"text", req:true},
  {k:"speakers_promoting", s:"marketing", q:"Are speakers helping promote the event?", t:"choice", options:["Yes","No"]},
  {k:"ad_creatives_folder", s:"marketing", q:"Do you have all ad creatives in one folder? (paste link, or “No”)", t:"text"},
  {k:"ad_set_types", s:"marketing", q:"Current ad sets are static images, video, or both?", t:"choice", options:["Static images","Video","Both","None yet"]},
  {k:"sms_email_strategy", s:"marketing", q:"Do you have a current SMS and email strategy in place?", t:"textarea"},
  {k:"crm", s:"marketing", q:"What CRM do you currently use?", t:"text", req:true, help:"e.g. GoHighLevel, ActiveCampaign, HubSpot"},
  // 8) Payment & data flow
  {k:"payment_processor", s:"payment", q:"What is your payment processor?", t:"text"},
  {k:"post_register_flow", s:"payment", q:"Where does your information go after someone registers?", t:"textarea"},
  {k:"ticket_auto_sent", s:"payment", q:"Is the ticket/invoice sent automatically, or is there another step?", t:"textarea"},
  // 9) Messaging setup
  {k:"a2p_registered", s:"messaging", q:"Have you registered for A2P 10DLC?", t:"choice", options:["Yes","No","Not sure"]},
  {k:"sending_domain", s:"messaging", q:"Which email domain will you use for sending?", t:"text"},
  {k:"domain_verified", s:"messaging", q:"Is your sending domain set up and verified?", t:"choice", options:["Yes","No","Not sure"]},
  {k:"old_leads", s:"messaging", q:"Do you have old leads to import/target?", t:"choice", options:["Yes","No"]},
  {k:"old_leads_count", s:"messaging", q:"If yes, approximately how many old leads?", t:"number"},
  {k:"old_leads_segmented", s:"messaging", q:"Are old leads segmented or all in one list?", t:"choice", options:["Segmented","One list","Not sure"]},
  // 10) Marketing questionnaire
  {k:"clients_top_goal", s:"questionnaire", q:"What is the number one most important thing your clients want to accomplish?", t:"textarea"},
  {k:"what_you_do", s:"questionnaire", q:"In one sentence, describe what you do for your clients.", t:"text"},
  {k:"products_standout", s:"questionnaire", q:"What products/services do you offer, and how do they stand out?", t:"textarea"},
  // 11) Brand positioning & story
  {k:"competitive_advantage", s:"brandstory", q:"Your single most competitive advantage?", t:"textarea"},
  {k:"audience_reach_challenges", s:"brandstory", q:"Challenges reaching your target audience effectively?", t:"textarea"},
  {k:"founder_story", s:"brandstory", q:"What painful life situation made you want to change?", t:"textarea"},
  // 12) Brand & competitor snapshot
  {k:"logo_link", s:"brandsnap", q:"Logo file link (Google Drive/Dropbox URL)?", t:"url"},
  {k:"brand_color_primary", s:"brandsnap", q:"Primary brand color (HEX)?", t:"text"},
  {k:"brand_color_secondary", s:"brandsnap", q:"Secondary brand color (HEX)?", t:"text"},
  {k:"brand_color_accent", s:"brandsnap", q:"Accent color (HEX, optional)?", t:"text"},
  {k:"brand_fonts", s:"brandsnap", q:"Brand fonts (if any)?", t:"text"},
  {k:"competitor_1", s:"brandsnap", q:"Competitor website 1?", t:"url"},
  {k:"competitor_2", s:"brandsnap", q:"Competitor website 2?", t:"url"},
  {k:"competitor_3", s:"brandsnap", q:"Competitor website 3?", t:"url"},
  {k:"competitor_likes", s:"brandsnap", q:"What do you like most about competitor marketing?", t:"textarea"},
  {k:"competitor_avoid", s:"brandsnap", q:"What should we avoid copying from competitors?", t:"textarea"},
  {k:"media_folder", s:"brandsnap", q:"Approved media asset folder link?", t:"url"},
  {k:"final_approver", s:"brandsnap", q:"Final approver for ads/funnels/copy + approval speed?", t:"text"},
  // 13) Audience deep-dive (the 10 keystone)
  {k:"aud_ideal", s:"audience", q:"Who is the ideal person who should buy a ticket?", t:"textarea", req:true, help:"The avatar. Be specific, not “everyone.”"},
  {k:"aud_demographics", s:"audience", q:"Age range, gender split, and where they live?", t:"text", help:"The hard demographics every profile needs."},
  {k:"aud_problem", s:"audience", q:"What is the #1 problem they're struggling with right now?", t:"textarea", req:true, help:"The pain everything leads with."},
  {k:"aud_quotes", s:"audience", q:"Paste 5–10 real things your customers have actually said.", t:"textarea", req:true, help:"The keystone. Leave their exact words, slang, and typos in. This becomes the ad copy."},
  {k:"aud_desire", s:"audience", q:"What do they really want underneath that, and who do they want to become?", t:"textarea", help:"Identity-level desire, not just “more money.”"},
  {k:"aud_objections", s:"audience", q:"Top reasons they hesitate or don't buy, and the real fear under each?", t:"textarea", help:"Objections, decoded."},
  {k:"aud_avoid", s:"audience", q:"What words, phrases, or vibes instantly turn them off or feel fake?", t:"textarea", req:true, help:"The avoid-list."},
  {k:"aud_not_fit", s:"audience", q:"Who is NOT a good fit / who don't you want in the room?", t:"textarea", req:true, help:"Protects ad spend + call quality."},
  {k:"aud_tiers", s:"audience", q:"Do different types of people buy different ticket tiers? Describe each.", t:"textarea", help:"Decides whether we build one avatar or four."},
  {k:"aud_why_you", s:"audience", q:"In one sentence: why do customers choose YOU, and the one transformation you deliver?", t:"textarea"},
];

/* ====== PAGES ======
   15 pages. Each page = a slice of Q in its existing order, so every question appears
   exactly once and nothing is reordered or dropped. The two biggest sections (Event,
   Brand & competitors) are split across two pages each. */
const PAGE_PLAN = [
  {title:"Basic info", count:4},
  {title:"Your event", count:5},
  {title:"Your event (continued)", count:5},
  {title:"Team & roles", count:4},
  {title:"Ideal customer & sales", count:5},
  {title:"Current status", count:3},
  {title:"Offer & pricing", count:2},
  {title:"Marketing & data", count:6},
  {title:"Payment & data flow", count:3},
  {title:"Messaging setup", count:6},
  {title:"Marketing questionnaire", count:3},
  {title:"Brand positioning", count:3},
  {title:"Brand & competitors", count:7},
  {title:"Brand & competitors (continued)", count:5},
  {title:"Your audience", count:10},
];
const PAGES = [];
(function buildPages(){
  let c = 0;
  for(const p of PAGE_PLAN){ PAGES.push({title:p.title, items:Q.slice(c, c+p.count)}); c += p.count; }
  // Safety net: if the plan ever undercounts, never drop questions — append the rest to the last page.
  if(c < Q.length){ PAGES[PAGES.length-1].items.push(...Q.slice(c)); }
})();
const TOTAL_PAGES = PAGES.length;

/* ====== STATE ====== */
const params = new URLSearchParams(location.search);
let clientId = params.get("clientId");
if(!clientId){ clientId = "c-" + Math.abs(Date.now()).toString(36) + Math.floor(performance.now()).toString(36); }
const STORE_KEY = "esa_onboarding_" + clientId;
let answers = {};
try{ answers = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(e){ answers = {}; }
let page = (answers.__lastPage != null) ? answers.__lastPage : -1; // -1 = intro screen

const screen = document.getElementById("screen");
const progress = document.getElementById("progress");
const counter = document.getElementById("counter");
const saveNote = document.getElementById("saveNote");

function autosave(){
  if(page >= 0 && page < TOTAL_PAGES) answers.__lastPage = page;
  localStorage.setItem(STORE_KEY, JSON.stringify(answers));
  saveNote.textContent = "✓ Progress saved — you can close this and come back anytime.";
}

function setProgress(){
  const pct = page < 0 ? 0 : Math.min(100, Math.round((page / TOTAL_PAGES) * 100));
  progress.style.width = pct + "%";
  counter.textContent = page < 0 ? "" : "Section " + (page+1) + " / " + TOTAL_PAGES;
}

function fieldHtml(item){
  const val = answers[item.k] || "";
  let field = "";
  if(item.t === "textarea"){
    field = `<textarea id="f_${item.k}" data-k="${item.k}" placeholder="Type your answer here...">${escapeHtml(val)}</textarea>`;
  } else if(item.t === "choice"){
    field = `<div class="choices" data-k="${item.k}">` + item.options.map(o=>
      `<div class="choice ${val===o?"sel":""}" data-v="${escapeAttr(o)}">${escapeHtml(o)}</div>`).join("") + `</div>`;
  } else {
    field = `<input id="f_${item.k}" data-k="${item.k}" type="${item.t}" value="${escapeAttr(val)}" placeholder="Type your answer here..." />`;
  }
  return `<div class="field-block" data-block="${item.k}">
    <h2 class="q">${escapeHtml(item.q)} ${item.req?'<span class="req">*</span>':''}</h2>
    ${item.help?`<div class="help">${escapeHtml(item.help)}</div>`:""}
    ${field}
  </div>`;
}

function render(){
  screen.classList.toggle("center-screen", !(page >= 0 && page < TOTAL_PAGES));
  if(page < 0) return renderIntro();
  if(page >= TOTAL_PAGES) return renderDone();
  const pg = PAGES[page];
  setProgress();
  const blocks = pg.items.map(fieldHtml).join("");
  screen.innerHTML = `
    <div class="eyebrow">${escapeHtml(pg.title)}</div>
    <div class="qnum">Section ${page+1} of ${TOTAL_PAGES}</div>
    <div class="page-fields">${blocks}</div>
    <div class="nav">
      ${page>0?'<button class="ghost" id="back">↑ Back</button>':''}
      <button class="go" id="next">${page===TOTAL_PAGES-1?"Review →":"Next →"}</button>
    </div>`;
  wireFields(pg);
}

function wireFields(pg){
  // Text-like inputs: auto-save on every keystroke + on blur.
  screen.querySelectorAll("input[data-k],textarea[data-k]").forEach(el=>{
    el.addEventListener("input", ()=>{ answers[el.dataset.k] = el.value; el.style.borderColor=""; autosave(); });
    el.addEventListener("blur",  ()=>{ answers[el.dataset.k] = el.value.trim(); autosave(); });
  });
  // Choice groups: select on click (no auto-advance, since a page has several questions).
  screen.querySelectorAll(".choices").forEach(group=>{
    const k = group.dataset.k;
    group.querySelectorAll(".choice").forEach(c=>{
      c.onclick = ()=>{
        answers[k] = c.getAttribute("data-v");
        group.querySelectorAll(".choice").forEach(x=>x.classList.remove("sel"));
        c.classList.add("sel");
        autosave();
      };
    });
  });
  document.getElementById("next").onclick = goNext;
  const back = document.getElementById("back"); if(back) back.onclick = goBack;
  const first = screen.querySelector("input[data-k],textarea[data-k]"); if(first) first.focus();
}

function collectPage(){
  PAGES[page].items.forEach(item=>{
    if(item.t !== "choice"){
      const el = document.getElementById("f_"+item.k);
      if(el) answers[item.k] = el.value.trim();
    }
  });
}

function goNext(){
  collectPage();
  for(const item of PAGES[page].items){
    if(item.req && !((answers[item.k]||"").length)){
      const block = screen.querySelector(`[data-block="${item.k}"]`);
      const el = document.getElementById("f_"+item.k);
      if(el) el.style.borderColor = "#ff3b30";
      if(block) block.scrollIntoView({behavior:"smooth", block:"center"});
      if(el && el.focus) el.focus();
      saveNote.textContent = "A required question on this page still needs an answer.";
      return;
    }
  }
  page++; autosave(); render(); window.scrollTo(0,0);
}

function goBack(){ collectPage(); page--; autosave(); render(); window.scrollTo(0,0); }

function renderIntro(){
  setProgress();
  const resuming = Object.keys(answers).filter(k=>k[0]!=="_").length > 0;
  screen.innerHTML = `<div class="center">
    <div class="pill">~10–15 min · 15 short sections · progress saves automatically</div>
    <h1>ESA Client Onboarding</h1>
    <p>The more complete your answers, the faster we can launch your funnel, ads, and follow-up systems. You can stop anytime and pick up right where you left off.</p>
    <div class="nav"><button class="go" id="start">${resuming?"Resume →":"Start →"}</button></div>
  </div>`;
  document.getElementById("start").onclick = ()=>{
    page = resuming ? (answers.__lastPage||0) : 0;
    if(page >= TOTAL_PAGES) page = TOTAL_PAGES - 1;
    render(); window.scrollTo(0,0);
  };
}

function renderDone(){
  progress.style.width = "100%"; counter.textContent = "Done";
  const filled = Object.keys(answers).filter(k=>k[0]!=="_" && (answers[k]||"").length).length;
  screen.innerHTML = `<div class="center">
    <div class="pill">All set</div>
    <h1>Thank you — you're done! 🎉</h1>
    <p>You answered ${filled} of ${Q.length} questions. Our team will take it from here and start building your launch. We'll be in touch shortly.</p>
    <div class="nav">
      <button class="go" id="submit">Submit my answers</button>
      <button class="ghost" id="review">↑ Review answers</button>
    </div>
    <p id="status" style="margin-top:18px"></p>
  </div>`;
  document.getElementById("review").onclick = ()=>{ page = 0; render(); window.scrollTo(0,0); };
  document.getElementById("submit").onclick = submitAll;
}

async function submitAll(){
  const status = document.getElementById("status");
  const clean = Object.fromEntries(Object.entries(answers).filter(([k])=>k[0]!=="_"));
  const row = {
    client_id: clientId,
    submitted_at: new Date().toISOString(),
    company_name: clean.company_name || null,
    email: clean.email || null,
    event_name: clean.event_name || null,
    answers: clean
  };
  status.textContent = "Submitting...";
  try{
    const r = await fetch(SUPABASE_URL + "/rest/v1/onboarding_submissions", {
      method:"POST",
      headers:{ "apikey": SUPABASE_ANON, "Authorization":"Bearer "+SUPABASE_ANON,
                "Content-Type":"application/json", "Prefer":"return=minimal" },
      body: JSON.stringify(row)
    });
    if(!r.ok) throw new Error("status "+r.status);
    answers.__submitted = true; localStorage.setItem(STORE_KEY, JSON.stringify(answers));
    status.innerHTML = "✓ Submitted — thank you! Our team has your answers.";
  }catch(e){ status.textContent = "Couldn't reach the server — your answers are saved locally; please try again."; }
}

function escapeHtml(s){return (s+"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function escapeAttr(s){return escapeHtml(s).replace(/'/g,"&#39;");}

render();
</script>
</body>
</html>
